<section id="home" class="hero hero-split" aria-labelledby="hero-title">
    <div class="hero-bg-word" aria-hidden="true">PORTFOLIO</div>
    <div class="container hero-split-layout">
        <div class="hero-left">
            <p class="intro-line" data-en="Hello, I'm" data-tr="Merhaba, ben">Hello, I'm</p>
            <h1 id="hero-title" class="hero-name">
                <span>Ayşe Nur</span>
                <span>Kendirci</span>
            </h1>
            <p class="hero-role"
               data-en="{{PROFILE_ROLE_EN}}"
               data-tr="{{PROFILE_ROLE_TR}}">
                {{PROFILE_ROLE_EN}}
            </p>
            <p class="hero-description"
               data-en="{{PROFILE_DESC_EN}}"
               data-tr="{{PROFILE_DESC_TR}}">
                {{PROFILE_DESC_EN}}
            </p>
            <div class="hero-buttons">
                <a href="#projects" class="btn" data-en="View Projects" data-tr="Projeleri Gör">
                    View Projects
                </a>
                <a href="{{PROFILE_CV}}"
                   class="btn btn-secondary"
                   download="Ayse_Nur_Kendirci_CV.pdf"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-en="Download CV"
                   data-tr="CV İndir">
                    Download CV
                </a>
            </div>
            <div class="hero-social-icons" aria-label="Social media links">
                <a href="{{PROFILE_GITHUB}}" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
                    <i class="devicon-github-original" aria-hidden="true"></i>
                </a>
                <a href="{{PROFILE_LINKEDIN}}" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
                    <i class="devicon-linkedin-plain" aria-hidden="true"></i>
                </a>
                <a href="mailto:{{PROFILE_EMAIL}}" aria-label="Send email">
                    <span aria-hidden="true">@</span>
                </a>
            </div>
        </div>
        <div class="hero-right">
            <div class="swing-wrapper">
                <div class="swing-line" aria-hidden="true"></div>
                <article class="portfolio-card">
                    <div class="portfolio-card-header" aria-hidden="true"></div>
                    <div class="portfolio-card-image">
                        <img src="{{PROFILE_IMAGE}}"
                             alt="Ayşe Nur Kendirci portre fotoğrafı"
                             data-alt-en="Portrait of Ayşe Nur Kendirci"
                             data-alt-tr="Ayşe Nur Kendirci portre fotoğrafı">
                    </div>
                    <div class="portfolio-card-footer">
                        <h2>{{PROFILE_NAME}}</h2>
                        <p data-en="{{PROFILE_ROLE_EN}}"
                           data-tr="{{PROFILE_ROLE_TR}}">
                            {{PROFILE_ROLE_EN}}
                        </p>
                    </div>
                </article>
            </div>
        </div>
    </div>
</section>
